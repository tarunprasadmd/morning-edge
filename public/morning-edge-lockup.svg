<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <title>Morning Edge — horizontal lockup</title>
  <desc>Square mark on left with gold ME monogram, MORNING EDGE serif wordmark on right with gold rule and italic subtitle</desc>
  <rect x="40" y="40" width="240" height="240" rx="50" fill="#0F172A"/>
  <line x1="100" y1="105" x2="220" y2="105" stroke="#D4A574" stroke-width="2.4" opacity="0.7"/>
  <text x="160" y="200" text-anchor="middle"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', 'DejaVu Serif', serif"
        font-size="115" font-style="italic" font-weight="400"
        fill="#F5D08C">ME</text>
  <line x1="100" y1="220" x2="220" y2="220" stroke="#D4A574" stroke-width="2.4" opacity="0.7"/>

  <text x="340" y="170"
        font-family="'Cormorant Garamond', Georgia, 'Times New Roman', 'DejaVu Serif', serif"
        font-size="76" font-weight="500" letter-spacing="11"
        fill="#0F172A">MORNING  EDGE</text>
  <line x1="340" y1="195" x2="1140" y2="195" stroke="#D4A574" stroke-width="2"/>
  <text x="340" y="240"
        font-family="'Cormorant Garamond', Georgia, 'DejaVu Serif', serif"
        font-size="32" font-style="italic" letter-spacing="4"
        fill="#475569">intelligence brief · by t-spot</text>
</svg>
